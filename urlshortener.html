<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BongShortz - URL Shortener</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Custom animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        /* Glassmorphism utility */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Anti-highlighting CSS */
        body {
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none; /* IE 10 and IE 11 */
            user-select: none; /* Standard syntax */
        }
        /* Allow user to type/select text ONLY inside the input field */
        input {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
    </style>
</head>
<!-- Anti-drag added to body via HTML attribute, though JS will also enforce it -->
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen flex flex-col items-center justify-center font-sans text-white p-4" ondragstart="return false;" ondrop="return false;">

    <!-- Main Container -->
    <main class="glass rounded-2xl p-8 shadow-2xl w-full max-w-lg relative overflow-hidden z-10">
        <!-- Decorative blue background glow -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-48 bg-blue-500 rounded-full mix-blend-multiply filter blur-[80px] opacity-50 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <h1 class="text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400 mb-2">
                <i class="fa-solid fa-link mr-2 text-blue-400"></i>BongShortz
            </h1>
            <p class="text-gray-400 text-sm">Paste your long URL below to make it short and sweet.</p>
        </div>

        <!-- Shortener Form -->
        <form id="shorten-form" class="relative z-10 flex flex-col gap-4">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-earth-americas text-gray-400"></i>
                </div>
                <input 
                    type="url" 
                    id="long-url" 
                    required 
                    placeholder="https://your-very-long-url.com/something" 
                    class="w-full pl-11 pr-4 py-4 rounded-xl bg-black/30 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-inner"
                >
            </div>
            
            <button 
                type="submit" 
                id="submit-btn"
                class="bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] flex justify-center items-center shadow-lg border border-blue-400/20"
            >
                <span id="btn-text">Shorten URL</span>
                <i id="btn-spinner" class="fa-solid fa-circle-notch fa-spin hidden ml-2"></i>
            </button>
        </form>

        <!-- Result Box -->
        <div id="result-container" class="hidden mt-6 relative z-10 animate-fade-in">
            <p class="text-sm text-green-400 mb-2 font-semibold"><i class="fa-solid fa-check-circle mr-1"></i> Success!</p>
            <div class="flex items-center justify-between bg-black/40 border border-green-500/30 rounded-xl p-2 pl-4">
                <a href="#" target="_blank" id="short-url" class="text-white hover:text-blue-400 truncate mr-4 transition-colors pointer-events-none cursor-default"></a>
                <button id="copy-btn" class="bg-blue-600/20 hover:bg-blue-600/40 text-blue-300 p-3 rounded-lg transition-colors flex items-center justify-center tooltip border border-blue-500/30" title="Copy to clipboard">
                    <i class="fa-regular fa-copy"></i>
                </button>
            </div>
        </div>

        <!-- Error Message -->
        <div id="error-container" class="hidden mt-4 relative z-10 bg-red-500/20 border border-red-500/50 text-red-200 p-3 rounded-xl text-sm animate-fade-in">
            <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="error-text">An error occurred.</span>
        </div>
    </main>

    <!-- Developer Credit -->
    <footer class="mt-8 text-sm text-gray-400 tracking-wide z-10">
        Developed by <span class="text-blue-400 font-bold drop-shadow-md">BongDevzz</span>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-900 text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-50 border border-blue-500/30">
        Copied to clipboard!
    </div>

    <!-- JavaScript Logic -->
    <script>
        /* =========================================
           ANTI-COPY & ANTI-THEFT PROTECTIONS 
           ========================================= */
        
        // Disable Right Click (Context Menu) - except on the input field so users can paste
        document.addEventListener('contextmenu', function(e) {
            if (e.target.tagName !== 'INPUT') {
                e.preventDefault();
            }
        });

        // Disable Keyboard Shortcuts (F12, Ctrl+U, Ctrl+Shift+I, Ctrl+C)
        document.addEventListener('keydown', function(e) {
            // Allow copy/paste (Ctrl+C, Ctrl+V, Ctrl+X) ONLY inside the input field
            if (e.target.tagName === 'INPUT') return;

            // Block F12 (DevTools)
            if (e.key === 'F12') {
                e.preventDefault();
            }
            // Block Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C (DevTools)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
            }
            // Block Ctrl+U (View Source) and Ctrl+C (Copy outside input)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.key === 'C' || e.key === 'c' || e.key === 'S' || e.key === 's')) {
                e.preventDefault();
            }
        });

        /* =========================================
           APP LOGIC
           ========================================= */
        
        const form = document.getElementById('shorten-form');
        const input = document.getElementById('long-url');
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        
        const resultContainer = document.getElementById('result-container');
        const shortUrlDisplay = document.getElementById('short-url');
        const copyBtn = document.getElementById('copy-btn');
        
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');
        const toast = document.getElementById('toast');

        // Form Submit Event
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const longUrl = input.value.trim();

            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');
            
            btnText.innerText = 'Shortening...';
            btnSpinner.classList.remove('hidden');
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(longUrl)}`);
                const data = await response.json();

                if (data.shorturl) {
                    shortUrlDisplay.href = data.shorturl;
                    shortUrlDisplay.innerText = data.shorturl;
                    resultContainer.classList.remove('hidden');
                    input.value = ''; 
                } else {
                    throw new Error(data.errormessage || 'Invalid URL or API error.');
                }
            } catch (err) {
                errorText.innerText = err.message || 'Failed to shorten the URL. Please try again.';
                errorContainer.classList.remove('hidden');
            } finally {
                btnText.innerText = 'Shorten URL';
                btnSpinner.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        });

        // Copy to Clipboard Event
        copyBtn.addEventListener('click', async () => {
            const urlToCopy = shortUrlDisplay.innerText;
            if(!urlToCopy) return;

            try {
                await navigator.clipboard.writeText(urlToCopy);
                
                const icon = copyBtn.querySelector('i');
                icon.classList.remove('fa-copy', 'fa-regular');
                icon.classList.add('fa-check', 'fa-solid', 'text-green-400');
                
                showToast();

                setTimeout(() => {
                    icon.classList.remove('fa-check', 'fa-solid', 'text-green-400');
                    icon.classList.add('fa-copy', 'fa-regular');
                }, 2000);
            } catch (err) {
                alert('Failed to copy to clipboard!');
            }
        });

        function showToast() {
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        }
    </script>
</body>
</html>
